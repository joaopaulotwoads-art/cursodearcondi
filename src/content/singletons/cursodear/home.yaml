landingModulesTitle: Programa do curso
landingModules:
  - title: "Módulo 1 — Fundamentos e segurança"
    text: |-
      Conceitos de refrigeração, tipos de sistema, EPIs, ferramentas essenciais e cuidados com eletricidade.
  - title: "Módulo 2 — Instalação do split"
    text: |-
      Escolha do ponto, furação, dreno, eletroduto, fixação, linhas e teste de estanqueidade.
  - title: "Módulo 3 — Vácuo e partida"
    text: |-
      Bomba de vácuo, tempo mínimo, nitrogênio quando necessário, liberação de refrigerante e partida segura.
  - title: "Módulo 4 — Manutenção e diagnóstico"
    text: |-
      Sintomas, superaquecimento, sub-resfriamento na prática, limpeza, recarga consciente e atendimento ao cliente.
landingFaqTitle: Dúvidas frequentes
landingFaq:
  - q: Preciso ter experiência com elétrica ou refrigeração?
    a: |-
      O curso parte do básico, mas trabalhar com energia e ferramentas exige cuidado. Siga sempre normas e legislação da sua região.
  - q: O certificado me habilita legalmente?
    a: |-
      Depende da legislação municipal/estadual e do tipo de serviço. Ajuste esta resposta com orientação jurídica adequada ao seu produto.
  - q: Como recebo o acesso após pagar?
    a: |-
      Descreva seu fluxo (e-mail com login, liberação manual, plataforma etc.).
  - q: Posso assistir no celular?
    a: |-
      Sim, na maioria das plataformas. Confirme conforme a ferramenta que você usa para hospedar as aulas.
