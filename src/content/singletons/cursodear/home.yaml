aboutText: |-
  A busca por “curso de ar condicionado” só cresce: quem sabe instalar e manter split atende uma demanda constante em residências e comércios.

  Este produto foi estruturado para você sair do zero com segurança e método — sem promessas milagrosas: exige estudo e prática. Ajuste este texto no painel com sua carga horária real, certificado e forma de acesso (plataforma, bônus, suporte).

