aboutTitle: Sobre nós
aboutText: |-
  O Bem Mãe é um espaço feito para mães e famílias que buscam informação de verdade, sem julgamento e com linguagem acessível.

  Falamos de rotina, alimentação, saúde e enxoval com o pé no chão, sempre lembrando que cada família tem o seu ritmo.
